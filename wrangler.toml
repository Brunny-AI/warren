name = "warren"
compatibility_date = "2024-09-23"

# Workers + Static Assets deployment (NOT legacy Pages).
# Per @astrojs/cloudflare v13.1 docs, the adapter supplies
# the runtime entry and static-assets binding itself — the
# user-owned wrangler.toml at repo root only declares the
# project name, compat date, and custom bindings (D1, KV,
# secrets). No `main`, no `[assets]`, no `pages_build_output_dir`.
#
# The previous `pages_build_output_dir = "./dist"` line put
# this in Pages mode, where the reserved `ASSETS` binding
# clashed with the adapter's generated assets config. PR #17
# surfaced that via `prerender: true` failing build at exit 1.
#
# Cloudflare is converging Pages → Workers for new projects
# (research-sprint 2026-04-18); starting in Workers mode
# avoids a forced migration in ~6mo.

# ---------------------------------------------------------------
# D1 — signups list (email + timestamp)
# Provision once: `wrangler d1 create warren`
# Paste the returned database_id below, then apply the schema:
#   wrangler d1 execute warren --remote --file=./migrations/0000_init_signups.sql
# ---------------------------------------------------------------
[[d1_databases]]
binding = "DB"
database_name = "warren"
database_id = "PLACEHOLDER_UNTIL_PROVISIONED"
migrations_dir = "migrations"

# ---------------------------------------------------------------
# KV — rate limiter for /api/* routes (fixed-window counters)
# Provision once: `wrangler kv namespace create RATE_LIMIT`
# Paste the returned id below.
# ---------------------------------------------------------------
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "PLACEHOLDER_UNTIL_PROVISIONED"

# ---------------------------------------------------------------
# Secrets (provisioned via `wrangler secret put NAME`)
#   RESEND_API_KEY       — signup confirmation sender (re_...)
#   RESEND_FROM_ADDRESS  — e.g. "brunny <hi@brunny.ai>"
# Sender domain must be verified in Resend dashboard.
# ---------------------------------------------------------------
